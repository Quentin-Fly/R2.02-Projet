<!DOCTYPE html> 
<html lang="fr">
    <head>
        <title>Kampus - Le Réseau Social pour Etudiants</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
        <meta charset="utf-8"/>
        <!-- Polices -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
        <!-- Icônes -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </head>
    <body>
        <!-- Page d'accueil -->
        <section id="page_accueil"> 
            <div class = "gauche">
                <h1>Kampus</h1>
                <div class="ligne_foncee"></div>
                <p>Le réseau social pour tous les étudiants. Echanger, s’entraider et partager sa vie universitaire.</p>
            </div>
            <div class = "droite">
                <div class="formulaire_conteneur">
                    <!-- Bouton switch (connexion/inscription)  => Connexion par défaut-->
                    <div class = "switch">
                        <!-- Slider pour l'effet visuel du switch -->
                        <div class="slider"></div>

                        <button class="button_defaut active" id="switch_connexion" class="active">Connexion</button>
                        <button class="button_defaut" id="switch_inscription">Inscription</button>
                    </div>
                    <div class="ligne_claire"></div>
                    <!-- Formulaire d'inscription -->
                    <form id="formulaire_inscription">
                        <label> Photo de profil :</label>
                        <div class="photo_profil_conteneur">
                            <div class="photo_profil_prevu">
                                <img src="data/utilisateur.png" id="photo_profil_apercu" alt="Photo de profil">
                            
                                <label for="image" class="overlay_edition">
                                    <i class="fa-solid fa-pen"></i>
                                </label>
                            </div>
                        </div>
                        <input type="file" id="image" accept="image/*" style="display: none;">
                        <div id="nom_prenom_conteneur">
                            <div class="groupe_champs">
                                <label for = "nom">Nom :</label>
                                <input type = "text" id="nom" name="nom" class="champs" placeholder="Dupont">
                            </div>
                            <div class="groupe_champs">
                                <label for = "prenom">Prénom :</label>
                                <input type = "text" id="prenom" name="prenom" class="champs" placeholder="Pierre">
                            </div>
                        </div>

                        <label for = "email">Email :</label>
                        <input type = "email" id="email" name="email" class="champs" placeholder="pierre.dupont@example.com">

                        <label for = "mdp_inscription">Mot de passe :</label>
                        <input type ="password" id="mdp_inscription" name="mdp_inscription" class="champs" placeholder="Entrez votre mot de passe">

                        <label for = "confirmation_mdp">Confirmer le mot de passe :</label>
                        <input type ="password" id="confirmation_mdp" name="confirmation_mdp" class="champs" placeholder="Confirmez votre mot de passe">

                        <div id = "checkbox_conteneur">
                            <input type="checkbox" id="conditions" name = "conditions">
                            <label for = "conditions">J'accepte les conditions d'utilisation et le règlement.</label>
                        </div>
                        <button class="button_defaut" type="submit" id="btn_inscription">S'inscrire</button>
                    </form>
                    <form id="formulaire_connexion" class="active">
                        <label for = "email_connexion">Email :</label>
                        <input type = "email" id="email_connexion" name="email_connexion" class="champs" placeholder="pierre.dupont@exemple.com">

                        <label for = "mdp_connexion">Mot de passe :</label>
                        <input type ="password" id="mdp_connexion" name="mdp_connexion" class="champs" placeholder="Entrez votre mot de passe">
                        <br>
                        <button class="button_defaut" type="submit" id="btn_connexion">Se connecter</button>
                    </form>
                </div>
            </div>
        </section>
        <!-- Pop-up d'erreur d'inscription -->
        <div class="pop_up erreur">
            <div class="pop_up_contenu">
                <h2>Erreur</h2>
                <div class="ligne_claire"></div>

                <p id="message_erreur">Message d'erreur</p>

                <button onclick="fermerPopUp('erreur')" id="btn_fermer_erreur" class="button_defaut">Fermer</button>
            </div>
        </div>
        <!-- Pop-up de succès inscription -->
        <div class="pop_up succes">
            <div class="pop_up_contenu">
                <h2>Succès</h2>
                <div class="ligne_claire"></div>

                <p>Inscription réussie !</p>

                <button onclick="fermerPopUp('succes')" id="btn_fermer_succes" class="button_defaut">Fermer</button>
            </div>
        </div>
        <!-- Section du fil d'actualité (cachée par défaut) -->
        <section id="fil_actualite" style="display: none;">
            
            <h1>Bienvenue sur le fil d'actualité de Kampus !</h1>
            <p>Découvrez les dernières publications de vos amis et partagez vos propres moments.</p>
        </section>
    </body>
</html>
